<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill - Beranda</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="beranda-body">

    <header class="navbar">
        <div class="logo-brand">
            <img src="https://cdn-icons-png.flaticon.com/512/4221/4221419.png" alt="Ikon Bioskop" class="logo-icon-small img-nav">
            <h1 class="logo-text-brand text-nav">CHILL</h1>
        </div>
        <div>
            <a href="login.html" style="color: white; text-decoration: none;
             font-size: 0.9rem; border: 1px solid #E50914; background-color:
              #E50914; padding: 8px 16px; border-radius: 4px; font-weight: 600; transition: background 0.2s;">Keluar</a>
        </div>
    </header>

    <main class="main-content">
        
        <section>
            <h2 class="section-title">Film Populer</h2>
            <div class="movie-grid">
                
                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Film</div>
                    <div class="movie-info">
                        <div class="movie-title">The Dark Knight</div>
                        <div class="movie-type">Film</div>
                    </div>
                </div>

                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Film</div>
                    <div class="movie-info">
                        <div class="movie-title">Inception</div>
                        <div class="movie-type">Film</div>
                    </div>
                </div>

                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Film</div>
                    <div class="movie-info">
                        <div class="movie-title">Interstellar</div>
                        <div class="movie-type">Film</div>
                    </div>
                </div>

            </div>
        </section>

        <section>
            <h2 class="section-title">Series Terbaru</h2>
            <div class="movie-grid">
                
                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Series</div>
                    <div class="movie-info">
                        <div class="movie-title">Stranger Things</div>
                        <div class="movie-type">Series</div>
                    </div>
                </div>

                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Series</div>
                    <div class="movie-info">
                        <div class="movie-title">Breaking Bad</div>
                        <div class="movie-type">Series</div>
                    </div>
                </div>

                <div class="movie-card">
                    <div class="movie-thumbnail">Poster Series</div>
                    <div class="movie-info">
                        <div class="movie-title">All of Us Are Dead</div>
                        <div class="movie-type">Series</div>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>
</html>
