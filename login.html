<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill - Masuk</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-brand">
                <img src="https://cdn-icons-png.flaticon.com/512/4221/4221419.png" alt="Ikon Bioskop" class="logo-icon-small">
                <h1 class="logo-text-brand">CHILL</h1>
            </div>
        </div>

        <div class="login-box">
            <h2>Masuk</h2>
            <p>Sambut hari ini dengan tontonan seru!</p>
            <form action="beranda.html" method="POST">
                <div class="input-group">
                    <label for="username">Username atau Email</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username Anda" required>
                </div>

                <div class="input-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan kata sandi Anda" required>
                </div>

                <!-- 3. Link Lupa Password -->
                <div class="forgot-password">
                    <a href="#">Lupa kata sandi?</a>
                </div>

                <!-- 4. Button Masuk -->
                <button type="submit" class="btn-submit">Masuk</button>
            </form>

            <div class="divider">
                <span>atau</span>
            </div>

            <!-- 4. Button Masuk dengan Google -->
            <button class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="18">
                Masuk dengan Google
            </button>

            <!-- 3. Link untuk Daftar -->
            <div class="register-link">
                <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
            </div>
        </div>
    </div>

</body>
</html>
