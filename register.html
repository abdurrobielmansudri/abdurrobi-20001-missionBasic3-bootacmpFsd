<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill - Daftar</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-brand">
                <img src="https://cdn-icons-png.flaticon.com/512/4221/4221419.png" alt="Ikon Bioskop" class="logo-icon-small">
                <h1 class="logo-text-brand">CHILL</h1>
            </div>
        </div>

        <div class="login-box">
            <h2>Daftar</h2>
            <p>Mulai petualangan menontonmu di sini!</p>

            <form action="login.html" method="POST">
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" placeholder="Masukkan username" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">Kata Sandi</label>
                    <input type="password" id="reg-password" name="password" placeholder="Masukkan kata sandi" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Konfirmasi Kata Sandi</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Masukkan kembali kata sandi" required>
                </div>

                <button type="submit" class="btn-submit">Daftar</button>
            </form>

            <div class="divider">
                <span>atau</span>
            </div>

            <button class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="18">
                Daftar dengan Google
            </button>

            <div class="register-link">
                <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
            </div>
        </div>
    </div>

</body>
</html>
